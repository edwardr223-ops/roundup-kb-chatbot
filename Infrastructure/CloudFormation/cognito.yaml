AWSTemplateFormatVersion: 2010-09-09
Parameters:
  # Foundation Stack Outputs
  DynamoDBKMSKeyId:
    Type: String
    Description: KMS key ID for DynamoDB encryption from Foundation stack
  DynamoDBKMSKeyArn:
    Type: String
    Description: KMS key ARN for DynamoDB encryption from Foundation stack (for IAM policies)
  S3KMSKeyArn:
    Type: String
    Description: KMS key ARN for S3 encryption from Foundation stack (for IAM policies)
  LambdaKMSKeyArn:
    Type: String
    Description: KMS key ARN for Lambda environment variable encryption from Foundation stack
  LambdaDLQArn:
    Type: String
    Description: ARN of Lambda dead letter queue from Foundation stack
  
  # Bedrock Stack Outputs
  AgentRoleArn:
    Type: String
    Description: ARN of the Bedrock Agent Resource role from Bedrock stack
  BedrockAgentId:
    Type: String
    Description: Bedrock Agent ID from Bedrock stack
  BedrockKMSKeyArn:
    Type: String
    Description: KMS key ARN for Bedrock Agent encryption from Bedrock stack
  KnowledgeBaseId:
    Type: String
    Description: Bedrock Knowledge Base ID from Bedrock stack
  PersonaS3Bucket:
    Type: String
    Description: S3 bucket for persona documents from Bedrock stack
  
  # User-provided Parameters
  AllowedEmailDomain:
    Type: String
    Description: Email domain allowed for user registration
  CognitoPrincipal:
    Type: String
    Description: Service Principal used for Cognito IAM Role Trust Policy
  KnowledgeBaseS3Bucket:
    Type: String
    Description: S3 bucket name for knowledge base documents

Resources:
  PreSignUpRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns: 
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SQSSendMessageToDLQ
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !Ref LambdaDLQArn

  PreSignUpLambda:
    Type: AWS::Lambda::Function
    Properties:
      Environment:
        Variables:
          AllowedDomain: !Ref AllowedEmailDomain
      Handler: index.lambda_handler
      Role: !GetAtt PreSignUpRole.Arn
      Runtime: python3.11
      Timeout: 60
      ReservedConcurrentExecutions: 1
      KmsKeyArn: !Ref LambdaKMSKeyArn
      DeadLetterConfig:
        TargetArn: !Ref LambdaDLQArn
      Code:
        ZipFile: |
          import os
          def lambda_handler(event, context):
            # It sets the user pool autoConfirmUser flag after validating the email domain
            event['response']['autoConfirmUser'] = False
        
            print(event)
            # Split the email address so we can compare domains
            address = event['request']['userAttributes']['email'].split('@')
            
            print(f"email address is {address}")
        
            if address[1].lower() != os.environ["AllowedDomain"].lower():
              raise Exception("Not an allowed email domain.")
              
            return event

  CognitoUserPool:
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Type: AWS::Cognito::UserPool
    Properties:
      AutoVerifiedAttributes: 
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpLambda.Arn

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders: 
        - ProviderName: !GetAtt CognitoUserPool.ProviderName
          ClientId:  !Ref CognitoUserPoolClient
      AllowClassicFlow: true

  IdPoolRoleMapping:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles: 
        "authenticated": !GetAtt UserAuthdRole.Arn 

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-appclient"
      UserPoolId: !Ref CognitoUserPool
      SupportedIdentityProviders:
        - COGNITO

  CognitoAuthenticatedUserPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-cognito-authenticated-user-policy'
      Description: Policy for authenticated Cognito users to access S3 and Bedrock
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: S3BucketAccess
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${KnowledgeBaseS3Bucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${KnowledgeBaseS3Bucket}/*'
              - !Sub 'arn:${AWS::Partition}:s3:::${PersonaS3Bucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${PersonaS3Bucket}/*'
          - Sid: KMSKeyAccess
            Effect: Allow
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:GenerateDataKey
            Resource:
              - !Ref DynamoDBKMSKeyArn
              - !Ref S3KMSKeyArn
              - !Ref LambdaKMSKeyArn
              - !Ref BedrockKMSKeyArn
          - Sid: BedrockAgentAliasAccess
            Effect: Allow
            Action:
              - bedrock:InvokeAgent
              - bedrock:CreateAgentAlias
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:agent-alias/${BedrockAgentId}/*'
          - Sid: BedrockKnowledgeBaseRetrieve
            Effect: Allow
            Action:
              - bedrock:Retrieve
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*'
          - Sid: BedrockModelInvoke
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:*::foundation-model/*'
          - Sid: BedrockInferenceProfileAccess
            Effect: Allow
            Action:
              - bedrock:GetInferenceProfile
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*'
          - Sid: BedrockKnowledgeBaseOperations
            Effect: Allow
            Action:
              - bedrock:CreateDataSource
              - bedrock:StartIngestionJob
              - bedrock:GetIngestionJob
              - bedrock:ListIngestionJobs
              - bedrock:RetrieveAndGenerate
              - bedrock:UpdateDataSource
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/${KnowledgeBaseId}'
          - Sid: BedrockDataSourceOperations
            Effect: Allow
            Action:
              - bedrock:CreateDataSource
              - bedrock:UpdateDataSource
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/${KnowledgeBaseId}/data-source/*'
          - Sid: BedrockListOperations
            Effect: Allow
            Action:
              - bedrock:ListFoundationModels
              - bedrock:ListInferenceProfiles
            Resource:
              - '*'
          - Sid: BedrockAgentOperations
            Effect: Allow
            Action:
              - bedrock:GetAgent
              - bedrock:UpdateAgent
              - bedrock:PrepareAgent
              - bedrock:CreateAgentAlias
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:agent/${BedrockAgentId}'
          - Sid: BedrockInlineAgentAccess
            Effect: Allow
            Action:
              - bedrock:InvokeInlineAgent
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:agent/InlineAgent'
          - Sid: IAMPassRoleForBedrock
            Effect: Allow
            Action: iam:PassRole
            Resource: !Sub '${AgentRoleArn}'
            Condition:
              StringEquals:
                'iam:PassedToService': 'bedrock.amazonaws.com'

  UserAuthdRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [
              {
                  "Effect": "Allow",
                  "Principal": {
                      "Federated": "${CognitoPrincipal}"
                  },
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                      "StringEquals": {
                          "${CognitoPrincipal}:aud": "${CognitoIdentityPool}"
                      },
                      "ForAnyValue:StringLike": {
                          "${CognitoPrincipal}:amr": "authenticated"
                      }
                  }
              }
          ]
        }
      ManagedPolicyArns:
        - !Ref CognitoAuthenticatedUserPolicy

  CognitoInvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PreSignUpLambda
      Principal: cognito-idp.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !GetAtt CognitoUserPool.Arn
  
  UserConversationHistory:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'UserConversationHistory-${AWS::StackName}-${AWS::Region}'
      BillingMode: PAY_PER_REQUEST  # On-demand pricing
      AttributeDefinitions:
        - AttributeName: userID
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
        - AttributeName: sessionID
          AttributeType: S
      KeySchema:
        - AttributeName: userID
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: sessionID-index
          KeySchema:
            - AttributeName: userID
              KeyType: HASH
            - AttributeName: sessionID
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref DynamoDBKMSKeyId
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: ChatBot

  UserPersonas:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'UserPersonas-${AWS::StackName}-${AWS::Region}'
      BillingMode: PAY_PER_REQUEST  # On-demand pricing
      AttributeDefinitions:
        - AttributeName: userID
          AttributeType: S
        - AttributeName: personaId
          AttributeType: S
      KeySchema:
        - AttributeName: userID
          KeyType: HASH
        - AttributeName: personaId
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref DynamoDBKMSKeyId
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: ChatBot
        - Key: Purpose
          Value: UserPersonas

  DynamoDBAccessPolicy:
    Type: AWS::IAM::Policy
    DependsOn: 
      - UserConversationHistory
      - UserPersonas
    Properties:
      PolicyName: dynamodb-access-policy
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:Query
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:BatchWriteItem
            Resource: 
              - !GetAtt UserConversationHistory.Arn
              - !Sub '${UserConversationHistory.Arn}/index/*'
              - !GetAtt UserPersonas.Arn
      Roles:
        - !Ref UserAuthdRole

Outputs:
  CognitoUserPoolId:
    Value: !Ref CognitoUserPool
  CognitoUserPoolClientId:
    Value: !Ref CognitoUserPoolClient
  CognitoIdentityPoolId:
    Value: !Ref CognitoIdentityPool
  UserConHistTable:
    Value: !Ref UserConversationHistory
  UserPersonasTable:
    Value: !Ref UserPersonas
